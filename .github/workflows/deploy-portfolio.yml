name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'portfolio/**'
      - 'avatar.jpg'
      - '.github/workflows/deploy-portfolio.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy avatar into portfolio folder
        run: |
          cp avatar.jpg portfolio/avatar.jpg
          cp bkash.jpg portfolio/bkash.jpg

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload portfolio as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
